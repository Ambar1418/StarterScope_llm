<!doctype html>
<html lang="en">
  <head>
    <script>
      window.addEventListener('error', function(e) {
        var errDiv = document.getElementById('debug-error-overlay');
        if (!errDiv) {
          errDiv = document.createElement('div');
          errDiv.id = 'debug-error-overlay';
          errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;background:#fff;color:#ef4444;padding:30px;font-family:monospace;font-size:14px;overflow:auto;line-height:1.5;box-sizing:border-box;';
          document.body.appendChild(errDiv);
        }
        errDiv.innerHTML = '<h2>🔴 Runtime JavaScript Error</h2>' +
          '<p><strong>Message:</strong> ' + e.message + '</p>' +
          '<p><strong>Source:</strong> ' + e.filename + ':' + e.lineno + ':' + e.colno + '</p>' +
          '<pre style="background:#fef2f2;padding:15px;border:1px solid #fee2e2;border-radius:6px;overflow:auto;">' + (e.error ? e.error.stack : 'No stack trace available') + '</pre>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        var errDiv = document.getElementById('debug-error-overlay');
        if (!errDiv) {
          errDiv = document.createElement('div');
          errDiv.id = 'debug-error-overlay';
          errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;background:#fff;color:#ef4444;padding:30px;font-family:monospace;font-size:14px;overflow:auto;line-height:1.5;box-sizing:border-box;';
          document.body.appendChild(errDiv);
        }
        var stack = e.reason && e.reason.stack ? e.reason.stack : '';
        var message = e.reason ? (e.reason.message || String(e.reason)) : 'Unknown rejection reason';
        errDiv.innerHTML = '<h2>🔴 Unhandled Promise Rejection</h2>' +
          '<p><strong>Reason:</strong> ' + message + '</p>' +
          '<pre style="background:#fef2f2;padding:15px;border:1px solid #fee2e2;border-radius:6px;overflow:auto;">' + (stack || 'No stack trace available') + '</pre>';
      });
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StarterScope — AI Market Intelligence for Indian Entrepreneurs</title>
    <meta name="description" content="StarterScope's 5-layer AI engine scans real markets, verifies local data, and gives you a strategic roadmap before you risk a single rupee." />
    <meta name="author" content="Team JAVA" />

    <meta property="og:title" content="StarterScope — AI Market Intelligence" />
    <meta property="og:description" content="Find your next big opportunity. Verified market data, financial estimates, and a launch roadmap." />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
