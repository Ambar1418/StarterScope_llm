services:
  # Python FastAPI Backend
  - type: web
    name: starterscope-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn index:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: starterscope-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      # Prompt the user for API credentials on setup
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: AIML_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: APIFY_API_KEY
        sync: false
      - key: DODO_PAYMENTS_API_KEY
        sync: false

  # React Frontend (Static Site)
  - type: web
    name: starterscope-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      # SPA rewrite rule to redirect all routes to index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Backend API URL. The user will be prompted to enter the public URL of the backend (starterscope-api)
      - key: VITE_API_URL
        sync: false

databases:
  - name: starterscope-db
    plan: free
